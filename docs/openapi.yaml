components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
        example: REQ0001
    StationCode:
      name: station_code
      in: path
      required: true
      schema:
        type: string
        example: FAST_01
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        example: U001

  responses:
    ErrorResponse:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalidParams:
              value:
                code: 1001
                message: 参数错误
                data:
                  reason: invalid request body

  schemas:
    ChargeMode:
      type: string
      enum: [FAST, SLOW]
    DispatchMode:
      type: string
      enum: [NORMAL, EXT_SINGLE_BATCH, EXT_FULL_BATCH]
    FaultDispatchMode:
      type: string
      enum: [PRIORITY, TIME_ORDER]
    RequestStatus:
      type: string
      enum:
        - WAITING_AREA
        - QUEUED
        - CHARGING
        - COMPLETED
        - COMPLETED_EARLY
        - CANCELLED
        - FAULT_INTERRUPTED
    StationStatus:
      type: string
      enum: [RUNNING, SHUTDOWN, FAULT]
    UserRole:
      type: string
      enum: [USER, ADMIN]
    ReportGranularity:
      type: string
      enum: [day, week, month]

    SuccessEnvelopeBase:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          const: 0
        message:
          type: string
          const: success
        data: {}

    ErrorEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          enum: [1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009, 1099]
        message:
          type: string
        data:
          type: object
          additionalProperties: true

    HealthData:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          const: ok
        timestamp:
          type: string
          format: date-time

    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthData'

    RegisterRequest:
      type: object
      required: [username, password, battery_capacity]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        battery_capacity:
          type: number
          format: float
          minimum: 0

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    AuthRegisterData:
      type: object
      required: [user_id, username, battery_capacity]
      properties:
        user_id:
          type: string
          example: U001
        username:
          type: string
        battery_capacity:
          type: number
          format: float

    AuthLoginData:
      type: object
      required: [token, user_id, username, role]
      properties:
        token:
          type: string
        user_id:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    AuthRegisterResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthRegisterData'

    AuthLoginResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthLoginData'

    CreateRequest:
      type: object
      required: [request_time, charge_mode, request_energy]
      properties:
        request_time:
          type: string
          format: date-time
        charge_mode:
          $ref: '#/components/schemas/ChargeMode'
        request_energy:
          type: number
          format: float
          exclusiveMinimum: 0
          maximum: 300

    CreateChargeRequestData:
      type: object
      required: [request_id, queue_number, request_status, front_waiting_count]
      properties:
        request_id:
          type: string
        queue_number:
          type: string
          pattern: '^[FT][1-9][0-9]*$'
        request_status:
          $ref: '#/components/schemas/RequestStatus'
        front_waiting_count:
          type: integer
          minimum: 0

    CreateChargeRequestResponse:
      allOf:
