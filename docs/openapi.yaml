                      results:
                        - user_id: U001
                          request_id: REQ0001
                          queue_number: F1
                          final_status: COMPLETED
                          detail:
                            detail_id: DETAIL0001
                            detail_generated_at: '2026-04-19T10:40:00'
                            station_code: FAST_01
